name: ANAPEC Fusion Monday

# MANUEL UNIQUEMENT — ne se déclenche JAMAIS automatiquement
# Ni au push, ni au schedule
# Uniquement quand vous cliquez "Run workflow" dans GitHub
on:
  workflow_dispatch:

jobs:
  fusion-monday:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fusion_TAB.mjs
        env:
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}
        run: node Fusion_TAB.mjs

      - name: Commit fusion log
        run: |
          git config --global user.name "ANAPEC Bot"
          git config --global user.email "bot@anapec-sync.com"
          git add fusion_log.txt || true
          git diff --staged --quiet || git commit -m "Fusion log - $(date '+%d/%m/%Y %H:%M')"
          git push || true
