name: ANAPEC Fusion Monday

# Déclenché par :
# 1. Push sur main (après pipeline PC)
# 2. Manuellement depuis GitHub (bouton "Run workflow")
# 3. Schedule: dimanche 14h Maroc = 13h UTC (UTC+1 en hiver, UTC+1 été)
on:
  push:
    branches: [main]
    paths:
      - '*/contrats.json'   # uniquement si des données changent
  workflow_dispatch:         # déclenchement manuel
  schedule:
    - cron: '0 13 * * 0'    # dimanche 13h UTC = 14h Maroc (UTC+1)

jobs:
  fusion-monday:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fusion_TAB.mjs
        env:
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}
        run: node Fusion_TAB.mjs

      - name: Commit fusion log
        run: |
          git config --global user.name "ANAPEC Bot"
          git config --global user.email "bot@anapec-sync.com"
          git add fusion_log.txt || true
          git diff --staged --quiet || git commit -m "Fusion log - $(date '+%d/%m/%Y %H:%M')"
          git push || true
