name: ANAPEC → Monday Sync

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison du déclenchement manuel'
        required: false
        default: 'Sync manuelle'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🌐 Installer Chromium pour Puppeteer
        run: npx puppeteer browsers install chrome

      - name: 🔌 Tester connectivité ANAPEC
        run: |
          echo "Test ping ANAPEC..."
          curl -v --max-time 30 -L "https://www.anapec.org/sigec-app-rv/" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -o /dev/null -w "HTTP Status: %{http_code}\nTime: %{time_total}s\n" || echo "Curl failed"

      - name: 🔍 Scraper ANAPEC
        env:
          ANAPEC_EMAIL: ${{ secrets.ANAPEC_EMAIL }}
          ANAPEC_PASSWORD: ${{ secrets.ANAPEC_PASSWORD }}
        run: node scraper_anapec.mjs

      - name: 📤 Synchroniser vers Monday.com via Lambda
        env:
          LAMBDA_URL: ${{ secrets.LAMBDA_URL }}
        run: node sync_weekly.mjs

      - name: 📊 Afficher le rapport
        if: always()
        run: |
          if [ -f sync_log.txt ]; then
            echo "=== JOURNAL ==="
            cat sync_log.txt
          fi
