name: ANAPEC → Monday Sync

on:
  schedule:
    # Chaque dimanche à 8h00 Maroc (UTC+1 = 7h UTC)
    - cron: '0 7 * * 0'
  
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison du déclenchement manuel'
        required: false
        default: 'Sync manuelle'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 📤 Synchroniser vers Monday.com via Lambda
        env:
          LAMBDA_URL: ${{ secrets.LAMBDA_URL }}
        run: node sync_weekly.mjs

      - name: 📊 Afficher le rapport
        if: always()
        run: |
          if [ -f sync_log.txt ]; then
            echo "=== JOURNAL ==="
            cat sync_log.txt
          fi
